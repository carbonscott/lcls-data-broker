# Tiled server configuration
uvicorn:
  host: "127.0.0.1"
  port: 8005

trees:
  - path: /
    tree: catalog
    args:
      uri: "sqlite:///catalog.db"  # Path to catalog database
      init_if_not_exists: true
      writable_storage: "storage"
      readable_storage: []  # Add base_dir paths for your datasets here

# Broker configuration (dataset-agnostic)
broker:
  # Service directory (where catalog.db and storage/ live)
  service_dir: "."

  # Data directory root (set to your data location)
  data_dir: "."
  schema_version: "data"

  # Registration defaults (override with MAX_ENTITIES env var)
  max_entities: 10
